<div class="login-page-wrapper">
  
  <button class="theme-toggle-btn" (click)="toggleTheme()" aria-label="Toggle theme">
    <svg *ngIf="themeService.theme() === 'light'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    <svg *ngIf="themeService.theme() === 'dark'" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
  </button>

  <div class="login-card-glass">
    <div class="logo-container">
      <img src="https://devopsmobiiscom.sharepoint.com/sites/MOBIISIntranet/_api/siteiconmanager/getsitelogo?type='1'&hash=638670162722780705" alt="Mobiis Logo" class="login-logo" />
    </div>

    <div class="header-text">
      <h2 class="welcome-text">Bem-vindo(a)</h2>
      <p class="subtitle-text">Faça login para continuar</p>
    </div>

    <form (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label for="username">{{ 'AUTH.USERNAME' | translate }}</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="username" 
            [(ngModel)]="username" 
            name="username" 
            placeholder="Username"
            required
            class="clean-input"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">{{ 'AUTH.PASSWORD' | translate }}</label>
        <div class="input-wrapper">
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            id="password" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="••••••••"
            required
            class="clean-input"
          >
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility()" aria-label="Toggle password visibility">
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </button>
        </div>
      </div>

      <div class="error-message" *ngIf="error">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span>Usuário ou senha incorretos.</span>
      </div>

      <button type="submit" class="btn-login">
        {{ 'AUTH.SUBMIT' | translate }}
      </button>

    </form>
  </div>
</div>
