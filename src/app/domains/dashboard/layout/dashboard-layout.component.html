<div class="layout-container">
  
  <header class="top-logo-bar">
    <div class="logo">
      <a routerLink="/dashboard/home">
        <img
          src="https://devopsmobiiscom.sharepoint.com/sites/MOBIISIntranet/_api/siteiconmanager/getsitelogo?type='1'&hash=638670162722780705"
          alt="Mobiis Logo" class="brand-logo" />
      </a>
    </div>
    <button class="sidebar-toggle-btn" (click)="toggleSidebar()" aria-label="Toggle Sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
  </header>

  <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
    <div class="sidebar-content">
      <nav class="nav-menu">
        <a routerLink="/dashboard/cockpit" routerLinkActive="active" class="nav-item">
          <span class="nav-number">1</span>
          <span>{{ 'SIDEBAR.COCKPIT' | translate }}</span>
        </a>
        <a routerLink="/dashboard/meet" routerLinkActive="active" class="nav-item">
          <span class="nav-number">2</span>
          <span>{{ 'SIDEBAR.MEET' | translate }}</span>
        </a>
        <a routerLink="/dashboard/crm" routerLinkActive="active" class="nav-item">
          <span class="nav-number">3</span>
          <span>{{ 'SIDEBAR.CRM' | translate }}</span>
        </a>
        <a routerLink="/dashboard/health" routerLinkActive="active" class="nav-item">
          <span class="nav-number">4</span>
          <span>{{ 'SIDEBAR.HEALTH' | translate }}</span>
        </a>
        <a routerLink="/dashboard/desk" routerLinkActive="active" class="nav-item">
          <span class="nav-number">5</span>
          <span>{{ 'SIDEBAR.DESK' | translate }}</span>
        </a>
        <a routerLink="/dashboard/roi" routerLinkActive="active" class="nav-item">
          <span class="nav-number">6</span>
          <span>{{ 'SIDEBAR.ROI' | translate }}</span>
        </a>
        <a routerLink="/dashboard/proposal" routerLinkActive="active" class="nav-item">
          <span class="nav-number">7</span>
          <span>{{ 'SIDEBAR.PROPOSAL' | translate }}</span>
        </a>
        <a routerLink="/dashboard/indicadores" routerLinkActive="active" class="nav-item">
          <span class="nav-number">8</span>
          <span>{{ 'SIDEBAR.INDICADORES' | translate }}</span>
        </a>
      </nav>

      <div class="bottom-menu">
        <button class="theme-toggle" (click)="toggleTheme()">
          <svg *ngIf="themeService.theme() === 'light'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg *ngIf="themeService.theme() === 'dark'" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <span *ngIf="themeService.theme() === 'light'">{{ 'SIDEBAR.DARK_MODE' | translate }}</span>
          <span *ngIf="themeService.theme() === 'dark'">{{ 'SIDEBAR.LIGHT_MODE' | translate }}</span>
        </button>
        
        <div class="lang-selector">
          <button [class.active]="currentLang === 'pt'" (click)="setLanguage('pt')">PT</button>
          <button [class.active]="currentLang === 'en'" (click)="setLanguage('en')">EN</button>
          <button [class.active]="currentLang === 'es'" (click)="setLanguage('es')">ES</button>
        </div>

        <div class="bottom-row">
          <span class="ia-label">IA <span class="ia-on">ON</span></span>
          <button class="logout-btn" (click)="logout()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            <span>{{ 'SIDEBAR.LOGOUT' | translate }}</span>
          </button>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-wrapper" [class.pushed]="!isSidebarCollapsed">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
